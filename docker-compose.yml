services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: devsearch-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: devsearch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  aistor-server:
    image: quay.io/minio/aistor/minio:latest
    container_name: aistor-server
    command: minio server /mnt/data --license /minio.license
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${HOME}/minio/data:/mnt/data
      - ${HOME}/minio/minio.license:/minio.license
      - ${HOME}/minio/certs:/etc/minio/certs
    restart: unless-stopped

volumes:
  pgdata: